<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting</title>
</head>
<body>
    <p><b>This is a Bold Text</b></p>
    <p><strong>This is a Strong (bold) Text</strong></p>

    <p><i>This is an Italic Text</i></p>
    <p><em>This is an Emphasized Text</em></p>

    <p><u>This is Underlined Text</u></p>
    <p><s>This is a Strikethrough Text</s></p>
    <p><mark>This is a Highlighted Text</mark></p>
    
</body>
</html>
