<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pre Tag (Performatted Text)</title>
</head>
<body>
    <p><pre>This tag displays the text exactly as it is --
         written, preserving spaces, tabs, and line breaks.
            
            It is mostly used when we want to
            show a code block or formatted content.</pre></p>
    
</body>
</html>
