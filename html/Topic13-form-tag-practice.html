
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Tag Practice</title>
</head>
<body>
  <form action="submit.html" method="post">
    <label for="First">First Name :</label>
    <input type="text" id="First" name="firstname" placeholder="Enter First Name"><br><br>
    <label for="Second">Second Name :</label>
    <input type="text" name="secondname" id="Second" placeholder="Enter Second Name"><br><br>
    <label for="email">Email :</label>
    <input type="text" name="email" id="email" placeholder="Enter Your Email"><br><br>
    <label for="pwd">Password :</label>
    <input type="password" name="password" id="pwd" placeholder="Enter Password"><br><br>
    <label for="sex">Gender</label>
    <input type="radio" name="gender" id="male" value="male">
    <label for="male">Male</label>
     <input type="radio" name="gender" id="female" value="female">
     <label for="female">Female</label>
     <input type="radio" name="gender" id="not to say" value="not to say"> 
     <label for="not to say">Not to Say</label> <br><br>
     <label for="city">Select City :</label>
     <select name="city" id="city">
         <option value="Noida">Noida</option>
     <option value="Gaziyabad">Gaziyabad</option>
     <option value="Delhi">Delhi</option>
     <option value="Bisrakh">BKL</option>
       <option value="Dadri">Dadri</option>
     </select> <br><br>
     <label for="comment">Comment</label> <br>
     <textarea name="comment" id="comment" rows="5" cols="30" placeholder="Write your comment..."></textarea> <br><br>
     
     <input type="reset">
     <input type="submit" value="Register"><br><br>

   
  
       
    
  </form>
</body>
</html>
